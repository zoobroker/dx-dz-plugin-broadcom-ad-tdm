name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node from .nvmrc (24) — matches the workspace runtime; bun is the tool.
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - run: bun install --frozen-lockfile

      # Content-hash drift gate: shipped source must match the sealed
      # plugin.lock.json version (bump + re-seal with `bun run plugins:bump`).
      - run: bun run plugins:verify

      # Single project → run-many covers everything (typecheck, lint, test, build).
      - run: bunx nx run-many -t typecheck lint test build

      # Advisory only — never block a PR on an advisory that landed overnight.
      - run: bun audit --audit-level=high
        continue-on-error: true
